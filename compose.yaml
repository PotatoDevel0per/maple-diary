# 이 PC에서 여러 앱을 함께 호스팅하는 구조.
# Caddy가 80/443을 받아 HTTPS를 자동 발급하고 각 앱으로 리버스 프록시한다.
# 앱을 추가할 때는 새 service + Caddyfile 한 블록만 늘리면 된다.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # 발급받은 인증서 (반드시 영속)
      - caddy_config:/config
    depends_on:
      - maple-diary

  maple-diary:
    build: .
    restart: unless-stopped
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=true
      - DATABASE_PATH=/data/maple.db
    volumes:
      - maple_data:/data       # SQLite 파일 (반드시 영속)
    expose:
      - "3000"                 # 외부 노출 없이 caddy만 접근

volumes:
  caddy_data:
  caddy_config:
  maple_data:
