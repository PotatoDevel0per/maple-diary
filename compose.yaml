# maple-diary — 중앙 Caddy(~/dev/infra/caddy)에 붙는 앱 컨테이너.
# HTTPS/도메인 라우팅은 중앙 Caddy가 담당하므로 여기서는 호스트 포트를 열지 않고
# caddy_net(external)에만 연결한다. (ScheduleApp과 동일 패턴)
#
# 배포:
#   docker compose up -d --build
#   그다음 ~/dev/infra/caddy/Caddyfile 에 블록 추가 후:
#   cd ~/dev/infra/caddy && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile

services:
  maple-diary:
    build: .
    container_name: maple-diary
    restart: unless-stopped
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=true
      - DATABASE_PATH=/data/maple.db
    volumes:
      - maple_data:/data       # SQLite 파일 (반드시 영속)
    networks:
      - caddy_net
    expose:
      - "3000"                 # 중앙 Caddy만 접근, 외부 미노출

networks:
  caddy_net:
    external: true

volumes:
  maple_data:
